name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check

      - name: Build site
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  accessibility:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install pa11y-ci and serve
        run: npm install --no-save pa11y-ci serve wait-on

      - name: Start server
        run: npx serve dist/ -l 8080 &

      - name: Wait for server
        run: npx wait-on http://localhost:8080 --timeout 10000

      - name: Run accessibility checks
        run: |
          npx pa11y-ci \
            --sitemap http://localhost:8080/sitemap-0.xml \
            --sitemap-find "https://ruiandrebatista.com" \
            --sitemap-replace "http://localhost:8080"

  links:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --base dist
            --no-progress
            --exclude-loopback
            --exclude-mail
            --exclude 'linkedin.com'
            --exclude 'facebook.com'
            dist/**/*.html
          fail: true
