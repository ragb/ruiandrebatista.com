name: Accessibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install pa11y-ci and serve
        run: npm install --no-save pa11y-ci serve wait-on

      - name: Start server
        run: npx serve dist/ -l 8080 &

      - name: Wait for server
        run: npx wait-on http://localhost:8080 --timeout 10000

      - name: Run accessibility checks
        run: |
          npx pa11y-ci \
            --sitemap http://localhost:8080/sitemap-0.xml \
            --sitemap-find "https://ruiandrebatista.com" \
            --sitemap-replace "http://localhost:8080"
